name: Build iOS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Init Flutter Project
        run: |
          flutter create --platforms=ios .
          git checkout lib/main.dart pubspec.yaml || true
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Required for AR gameplay and QR scanning'" ios/Runner/Info.plist
        working-directory: ./client

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./client

      - name: Build iOS (No Codesign)
        run: flutter build ios --release --no-codesign
        working-directory: ./client

      - name: Package IPA
        run: |
          cd client/build/ios/iphoneos
          mkdir Payload
          mv Runner.app Payload/
          zip -r app.ipa Payload
        
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: client/build/ios/iphoneos/app.ipa