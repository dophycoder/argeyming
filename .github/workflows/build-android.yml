name: Build Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Init Flutter Project
        run: |
          flutter create --platforms=android .
          git checkout lib/main.dart pubspec.yaml || true
          sed -i '/<application/i \    <uses-permission android:name="android.permission.CAMERA" />' android/app/src/main/AndroidManifest.xml
          sed -i 's/compileSdk = flutter.compileSdkVersion/compileSdk = 36/g' android/app/build.gradle.kts
          sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 24/g' android/app/build.gradle.kts
          echo "subprojects { afterEvaluate { if (plugins.hasPlugin(\"com.android.library\") || plugins.hasPlugin(\"com.android.application\")) { android { compileSdk = 36 } } } }" >> android/build.gradle.kts
        working-directory: ./client

      - name: Install dependencies
        run: flutter pub get
        working-directory: ./client

      - name: Build APK
        run: flutter build apk --release
        working-directory: ./client

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: client/build/app/outputs/flutter-apk/app-release.apk